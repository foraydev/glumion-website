<section class="hero" id="hero">

    <img src="assets/glumion-capsule-art.png" alt="Glumion" class="hero-image">
  </div>
  <div class="hero-blur"></div>
  <div class="hero-content">
    <img src="assets/glumion-logo.png" alt="Glumion Logo" class="hero-logo">
  </div>
</section>
